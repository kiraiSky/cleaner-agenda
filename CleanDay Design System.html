<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanDay — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --green-900: oklch(28% 0.06 155);
    --green-800: oklch(34% 0.07 155);
    --green-700: oklch(42% 0.09 155);
    --green-600: oklch(50% 0.10 155);
    --green-500: oklch(58% 0.10 155);
    --green-400: oklch(66% 0.09 155);
    --green-300: oklch(76% 0.08 155);
    --green-200: oklch(87% 0.05 155);
    --green-100: oklch(94% 0.03 155);
    --green-50:  oklch(97% 0.015 155);

    --sand-900: oklch(28% 0.025 75);
    --sand-800: oklch(38% 0.03 75);
    --sand-700: oklch(48% 0.04 75);
    --sand-600: oklch(58% 0.04 75);
    --sand-400: oklch(72% 0.04 75);
    --sand-300: oklch(82% 0.03 75);
    --sand-200: oklch(90% 0.02 75);
    --sand-100: oklch(95% 0.015 75);
    --sand-50:  oklch(98% 0.008 75);

    --bg:        oklch(98.5% 0.006 90);
    --bg-card:   #FFFFFF;
    --border:    oklch(91% 0.012 100);
    --border-md: oklch(85% 0.018 100);

    --text-primary:   var(--green-900);
    --text-secondary: oklch(52% 0.025 120);
    --text-muted:     oklch(68% 0.018 100);
    --text-inv:       #FFFFFF;

    --accent-green: var(--green-600);
    --accent-sand:  var(--sand-600);
    --accent-amber: oklch(70% 0.12 65);

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  16px;
    --radius-xl:  22px;
    --radius-full: 999px;

    --shadow-sm:  0 1px 3px oklch(20% 0.02 120 / 0.06), 0 1px 2px oklch(20% 0.02 120 / 0.04);
    --shadow-md:  0 4px 12px oklch(20% 0.02 120 / 0.08), 0 2px 4px oklch(20% 0.02 120 / 0.04);
    --shadow-lg:  0 12px 32px oklch(20% 0.02 120 / 0.10), 0 4px 8px oklch(20% 0.02 120 / 0.06);

    --font-sans: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
</style>
</head>
<body>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

const { useState, useEffect } = React;

/* ─── ICONS (SVG inline, ultra-simple) ─── */
const Icon = ({ name, size = 18, color = 'currentColor', strokeWidth = 1.8 }) => {
  const paths = {
    home: <><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/><path d="M9 21V12h6v9"/></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
    users: <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></>,
    check: <><path d="M20 6L9 17l-5-5"/></>,
    dollar: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></>,
    history: <><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    chevronRight: <><polyline points="9 18 15 12 9 6"/></>,
    chevronLeft: <><polyline points="15 18 9 12 15 6"/></>,
    chevronDown: <><polyline points="6 9 12 15 18 9"/></>,
    search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></>,
    mapPin: <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></>,
    bell: <><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></>,
    star: <><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
    trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
    edit: <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    phone: <><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></>,
    clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
    drop: <><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></>,
    arrowUp: <><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></>,
    arrowDown: <><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></>,
    grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

/* ─── TOKENS DISPLAY ─── */
const ColorSwatch = ({ name, value, textColor = '#1E3530' }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'center' }}>
    <div style={{ width: 48, height: 48, borderRadius: 10, background: value, border: '1px solid rgba(0,0,0,0.06)', boxShadow: '0 1px 3px rgba(0,0,0,0.06)' }}></div>
    <span style={{ fontSize: 10, color: 'var(--text-muted)', textAlign: 'center', lineHeight: 1.3 }}>{name}</span>
  </div>
);

/* ─── BUTTON COMPONENT ─── */
const Button = ({ variant = 'primary', size = 'md', icon, children, onClick }) => {
  const [hover, setHover] = useState(false);
  const sizes = {
    sm: { padding: '6px 12px', fontSize: 12, gap: 5 },
    md: { padding: '10px 18px', fontSize: 14, gap: 6 },
    lg: { padding: '13px 24px', fontSize: 15, gap: 8 },
  };
  const variants = {
    primary: {
      background: hover ? 'var(--green-700)' : 'var(--green-600)',
      color: '#fff',
      border: 'none',
    },
    secondary: {
      background: hover ? 'var(--green-100)' : 'var(--green-50)',
      color: 'var(--green-700)',
      border: '1.5px solid var(--green-200)',
    },
    ghost: {
      background: hover ? 'var(--sand-100)' : 'transparent',
      color: 'var(--text-secondary)',
      border: '1.5px solid transparent',
    },
    danger: {
      background: hover ? 'oklch(40% 0.12 25)' : 'oklch(45% 0.12 25)',
      color: '#fff',
      border: 'none',
    },
    sand: {
      background: hover ? 'var(--sand-200)' : 'var(--sand-100)',
      color: 'var(--sand-800)',
      border: '1.5px solid var(--sand-300)',
    },
  };
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: sizes[size].gap,
        padding: sizes[size].padding, fontSize: sizes[size].fontSize,
        fontFamily: 'var(--font-sans)', fontWeight: 500, letterSpacing: '-0.01em',
        borderRadius: 'var(--radius-full)', cursor: 'pointer',
        transition: 'all 0.15s ease', ...variants[variant],
      }}
    >
      {icon && <Icon name={icon} size={sizes[size].fontSize} />}
      {children}
    </button>
  );
};

/* ─── BADGE ─── */
const Badge = ({ label, color = 'green' }) => {
  const colors = {
    green:  { bg: 'var(--green-100)', text: 'var(--green-700)' },
    sand:   { bg: 'var(--sand-100)',  text: 'var(--sand-800)' },
    amber:  { bg: 'oklch(96% 0.04 75)', text: 'oklch(52% 0.12 65)' },
    red:    { bg: 'oklch(96% 0.04 20)', text: 'oklch(44% 0.14 25)' },
    blue:   { bg: 'oklch(94% 0.04 240)', text: 'oklch(44% 0.12 240)' },
    purple: { bg: 'oklch(94% 0.04 290)', text: 'oklch(44% 0.12 290)' },
  };
  const c = colors[color] || colors.green;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '3px 10px', borderRadius: 'var(--radius-full)',
      fontSize: 12, fontWeight: 500, letterSpacing: '-0.01em',
      background: c.bg, color: c.text,
    }}>
      {label}
    </span>
  );
};

/* ─── INPUT ─── */
const Input = ({ label, placeholder, icon, type = 'text' }) => {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      {label && <label style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-secondary)', letterSpacing: '-0.01em' }}>{label}</label>}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '10px 14px', borderRadius: 'var(--radius-md)',
        border: `1.5px solid ${focus ? 'var(--green-400)' : 'var(--border-md)'}`,
        background: '#fff',
        boxShadow: focus ? '0 0 0 3px var(--green-100)' : 'none',
        transition: 'all 0.15s ease',
      }}>
        {icon && <Icon name={icon} size={15} color="var(--text-muted)" />}
        <input
          type={type}
          placeholder={placeholder}
          onFocus={() => setFocus(true)}
          onBlur={() => setFocus(false)}
          style={{
            flex: 1, border: 'none', outline: 'none',
            fontFamily: 'var(--font-sans)', fontSize: 14,
            color: 'var(--text-primary)', background: 'transparent',
          }}
        />
      </div>
    </div>
  );
};

/* ─── AVATAR ─── */
const Avatar = ({ name, size = 36, color = 'green' }) => {
  const initials = name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  const colors = {
    green: { bg: 'var(--green-200)', text: 'var(--green-800)' },
    sand:  { bg: 'var(--sand-200)',  text: 'var(--sand-800)' },
    amber: { bg: 'oklch(90% 0.06 75)', text: 'oklch(48% 0.12 65)' },
  };
  const c = colors[color] || colors.green;
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: c.bg, color: c.text,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.35, fontWeight: 600, letterSpacing: '-0.02em',
      flexShrink: 0,
    }}>{initials}</div>
  );
};

/* ─── CARD ─── */
const Card = ({ children, style = {}, onClick }) => (
  <div onClick={onClick} style={{
    background: 'var(--bg-card)', borderRadius: 'var(--radius-lg)',
    border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)',
    padding: '16px', ...style, cursor: onClick ? 'pointer' : 'default',
  }}>
    {children}
  </div>
);

/* ─── STAT CARD ─── */
const StatCard = ({ label, value, sub, icon, trend, color = 'green' }) => {
  const colors = {
    green: { bg: 'var(--green-50)', icon: 'var(--green-600)', border: 'var(--green-200)' },
    sand:  { bg: 'var(--sand-50)', icon: 'var(--sand-600)', border: 'var(--sand-200)' },
    amber: { bg: 'oklch(97% 0.02 75)', icon: 'oklch(58% 0.12 65)', border: 'oklch(88% 0.04 75)' },
  };
  const c = colors[color] || colors.green;
  return (
    <div style={{
      background: c.bg, borderRadius: 'var(--radius-lg)', border: `1px solid ${c.border}`,
      padding: '16px', display: 'flex', flexDirection: 'column', gap: 10,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-secondary)' }}>{label}</span>
        <div style={{ color: c.icon }}><Icon name={icon} size={16} /></div>
      </div>
      <div>
        <div style={{ fontSize: 24, fontFamily: 'var(--font-display)', color: 'var(--text-primary)', lineHeight: 1 }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>{sub}</div>}
      </div>
      {trend !== undefined && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, fontWeight: 500, color: trend >= 0 ? 'var(--green-600)' : 'oklch(50% 0.12 25)' }}>
          <Icon name={trend >= 0 ? 'arrowUp' : 'arrowDown'} size={11} />
          {Math.abs(trend)}% este mês
        </div>
      )}
    </div>
  );
};

/* ─── CLIENT CARD ─── */
const ClientCard = ({ name, houses, nextClean, status }) => (
  <Card style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px' }}>
    <Avatar name={name} color={['green','sand','amber'][name.length % 3]} />
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ fontWeight: 500, fontSize: 14, letterSpacing: '-0.02em', marginBottom: 2 }}>{name}</div>
      <div style={{ fontSize: 12, color: 'var(--text-muted)', display: 'flex', alignItems: 'center', gap: 6 }}>
        <Icon name="home" size={11} color="var(--text-muted)" />
        {houses} {houses === 1 ? 'casa' : 'casas'}
        {nextClean && <><span style={{ opacity: 0.4 }}>·</span><Icon name="clock" size={11} color="var(--text-muted)" />{nextClean}</>}
      </div>
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <Badge label={status === 'active' ? 'Ativo' : status === 'pending' ? 'Pendente' : 'Inativo'} color={status === 'active' ? 'green' : status === 'pending' ? 'amber' : 'sand'} />
      <Icon name="chevronRight" size={14} color="var(--text-muted)" />
    </div>
  </Card>
);

/* ─── HOUSE CARD ─── */
const HouseCard = ({ address, area, rooms, lastClean, nextClean }) => (
  <Card style={{ padding: '16px' }}>
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: 'var(--green-100)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--green-600)', flexShrink: 0 }}>
          <Icon name="home" size={16} />
        </div>
        <div>
          <div style={{ fontWeight: 500, fontSize: 13, letterSpacing: '-0.02em' }}>{address}</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>{area} m² · {rooms} quartos</div>
        </div>
      </div>
      <Icon name="chevronRight" size={14} color="var(--text-muted)" />
    </div>
    <div style={{ display: 'flex', gap: 8, paddingTop: 12, borderTop: '1px solid var(--border)' }}>
      {lastClean && (
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 2 }}>Última limpeza</div>
          <div style={{ fontSize: 12, fontWeight: 500 }}>{lastClean}</div>
        </div>
      )}
      {nextClean && (
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 2 }}>Próxima</div>
          <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--green-600)' }}>{nextClean}</div>
        </div>
      )}
    </div>
  </Card>
);

/* ─── CHECKLIST ITEM ─── */
const CheckItem = ({ label, checked: initChecked = false }) => {
  const [checked, setChecked] = useState(initChecked);
  return (
    <div
      onClick={() => setChecked(!checked)}
      style={{
        display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0',
        borderBottom: '1px solid var(--border)', cursor: 'pointer',
      }}
    >
      <div style={{
        width: 20, height: 20, borderRadius: 6, border: `2px solid ${checked ? 'var(--green-500)' : 'var(--border-md)'}`,
        background: checked ? 'var(--green-500)' : '#fff',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'all 0.15s ease', flexShrink: 0,
      }}>
        {checked && <Icon name="check" size={12} color="#fff" strokeWidth={2.5} />}
      </div>
      <span style={{ fontSize: 14, color: checked ? 'var(--text-muted)' : 'var(--text-primary)', textDecoration: checked ? 'line-through' : 'none', transition: 'all 0.15s' }}>
        {label}
      </span>
    </div>
  );
};

/* ─── CALENDAR DAY ─── */
const CalDay = ({ day, hasEvent, isToday, isSelected }) => (
  <div style={{
    width: 34, height: 34, borderRadius: '50%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
    background: isSelected ? 'var(--green-600)' : isToday ? 'var(--green-100)' : 'transparent',
    cursor: 'pointer', fontSize: 13, fontWeight: isToday || isSelected ? 600 : 400,
    color: isSelected ? '#fff' : isToday ? 'var(--green-700)' : 'var(--text-primary)',
    position: 'relative',
  }}>
    {day}
    {hasEvent && !isSelected && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isToday ? 'var(--green-600)' : 'var(--green-400)', position: 'absolute', bottom: 3 }}></div>}
  </div>
);

/* ─── MOBILE PHONE FRAME ─── */
const PhoneFrame = ({ children, screenBg = 'var(--bg)', label }) => (
  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
    {label && <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{label}</div>}
    <div style={{
      width: 320, height: 620, borderRadius: 40, background: '#1A1A1A',
      padding: '12px 8px', boxShadow: '0 24px 64px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.08)',
      position: 'relative', overflow: 'hidden',
    }}>
      {/* notch */}
      <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', width: 80, height: 24, background: '#1A1A1A', borderRadius: 12, zIndex: 10 }}></div>
      <div style={{
        width: '100%', height: '100%', borderRadius: 32, overflow: 'hidden',
        background: screenBg, display: 'flex', flexDirection: 'column',
      }}>
        {/* status bar */}
        <div style={{ padding: '14px 20px 6px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-secondary)' }}>9:41</span>
          <div style={{ display: 'flex', gap: 4, color: 'var(--text-secondary)' }}>

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "green",
  "fontStyle": "serif",
  "density": "comfortable",
  "darkMode": false
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeScreen, setActiveScreen] = useState('dashboard');

  // Apply accent
  useEffect(() => {
    const root = document.documentElement;
    const accents = {
      green: { h: '155' },
      teal:  { h: '188' },
      sage:  { h: '145' },
    };
    const a = accents[tweaks.accentColor] || accents.green;
    root.style.setProperty('--green-600', `oklch(50% 0.10 ${a.h})`);
    root.style.setProperty('--green-700', `oklch(42% 0.09 ${a.h})`);
    root.style.setProperty('--green-500', `oklch(58% 0.10 ${a.h})`);
    root.style.setProperty('--green-200', `oklch(87% 0.05 ${a.h})`);
    root.style.setProperty('--green-100', `oklch(94% 0.03 ${a.h})`);
    root.style.setProperty('--green-50',  `oklch(97% 0.015 ${a.h})`);
    root.style.setProperty('--font-display', tweaks.fontStyle === 'serif' ? "'DM Serif Display', serif" : "'DM Sans', sans-serif");
  }, [tweaks.accentColor, tweaks.fontStyle]);

  const screens = {
    dashboard: <ScreenDashboard />,
    clients:   <ScreenClients />,
    profile:   <ScreenProfile />,
    calendar:  <ScreenCalendar />,
    checklist: <ScreenChecklist />,
    history:   <ScreenHistory />,
    money:     <ScreenMoney />,
  };

  const screenLabels = {
    dashboard: 'Dashboard',
    clients:   'Lista de Clientes',
    profile:   'Perfil do Cliente',
    calendar:  'Agenda / Calendário',
    checklist: 'Checklist de Limpeza',
    history:   'Histórico',
    money:     'Finanças / Money Flow',
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', padding: '40px 24px 80px' }}>
      {/* header */}
      <div style={{ maxWidth: 1200, margin: '0 auto 48px' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 8 }}>
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 42, letterSpacing: '-0.03em', color: 'var(--green-800)' }}>CleanDay</span>
          <span style={{ fontSize: 13, color: 'var(--text-muted)', background: 'var(--green-100)', padding: '2px 10px', borderRadius: 'var(--radius-full)' }}>Design System v1</span>
        </div>
        <p style={{ fontSize: 15, color: 'var(--text-secondary)', maxWidth: 520, lineHeight: 1.6 }}>
          Padrão visual para o app de agenda de limpezas. Clique nas telas abaixo para explorar cada fluxo.
        </p>
      </div>

      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 64 }}>

        {/* ── CORES ── */}
        <section>
          <SectionHeader title="Cores" subtitle="Paleta verde-sálvia natural + bege quente" />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <TokenRow label="Verde (principal)">
              {['--green-900','--green-700','--green-600','--green-500','--green-300','--green-200','--green-100','--green-50'].map(v => (
                <ColorSwatch key={v} name={v.replace('--green-','')} value={`var(${v})`} />
              ))}
            </TokenRow>
            <TokenRow label="Areia (neutro quente)">
              {['--sand-900','--sand-700','--sand-600','--sand-400','--sand-300','--sand-200','--sand-100','--sand-50'].map(v => (
                <ColorSwatch key={v} name={v.replace('--sand-','')} value={`var(${v})`} />
              ))}
            </TokenRow>
            <TokenRow label="Semânticas">
              {[
                { name: 'bg', val: 'var(--bg)' },
                { name: 'card', val: 'var(--bg-card)' },
                { name: 'border', val: 'var(--border)' },
                { name: 'text', val: 'var(--text-primary)' },
                { name: 'secondary', val: 'var(--text-secondary)' },
                { name: 'muted', val: 'var(--text-muted)' },
                { name: 'amber', val: 'var(--accent-amber)' },
              ].map(c => <ColorSwatch key={c.name} name={c.name} value={c.val} />)}
            </TokenRow>
          </div>
        </section>

        {/* ── TIPOGRAFIA ── */}
        <section>
          <SectionHeader title="Tipografia" subtitle="DM Serif Display (display) · DM Sans (corpo)" />
          <div style={{ background: '#fff', borderRadius: 'var(--radius-xl)', border: '1px solid var(--border)', padding: '32px', display: 'flex', flexDirection: 'column', gap: 24 }}>
            {[
              { label: 'Display / H1', style: { fontFamily: 'var(--font-display)', fontSize: 36, letterSpacing: '-0.03em', color: 'var(--text-primary)' }, text: 'Agenda de Limpeza' },
              { label: 'H2', style: { fontFamily: 'var(--font-display)', fontSize: 24, letterSpacing: '-0.02em' }, text: 'Clientes e Casas' },
              { label: 'H3 / Section', style: { fontFamily: 'var(--font-sans)', fontSize: 16, fontWeight: 600, letterSpacing: '-0.02em' }, text: 'Próximas limpezas' },
              { label: 'Body Regular', style: { fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--text-secondary)' }, text: 'Rua das Flores, 42 — São Paulo, SP' },
              { label: 'Caption / Label', style: { fontFamily: 'var(--font-sans)', fontSize: 12, color: 'var(--text-muted)', fontWeight: 500 }, text: 'Última limpeza · 25 abr 2026' },
              { label: 'Micro / Badge', style: { fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 600, letterSpacing: '0.02em', color: 'var(--text-muted)', textTransform: 'uppercase' }, text: 'ATIVO · PENDENTE · CONCLUÍDO' },
            ].map((item, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'baseline', gap: 20 }}>
                <div style={{ width: 140, fontSize: 10, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.04em', flexShrink: 0 }}>{item.label}</div>
                <div style={item.style}>{item.text}</div>
              </div>
            ))}
          </div>
        </section>

        {/* ── COMPONENTES ── */}
        <section>
          <SectionHeader title="Componentes" subtitle="Botões, badges, inputs, avatares" />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            {/* Botões */}
            <ComponentCard title="Botões">
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                <Button variant="primary" icon="plus">Agendar</Button>
                <Button variant="secondary" icon="users">Clientes</Button>
                <Button variant="sand">Detalhes</Button>
                <Button variant="ghost" icon="edit">Editar</Button>
                <Button variant="danger" icon="trash">Excluir</Button>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 8 }}>
                <Button variant="primary" size="sm" icon="plus">Novo</Button>
                <Button variant="primary" size="lg">Concluir limpeza</Button>
              </div>
            </ComponentCard>

            {/* Badges */}
            <ComponentCard title="Badges / Status">
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                <Badge label="Ativo" color="green" />
                <Badge label="Pendente" color="amber" />
                <Badge label="Inativo" color="sand" />
                <Badge label="Pago" color="green" />
                <Badge label="A pagar" color="red" />
                <Badge label="Agendado" color="blue" />
                <Badge label="Recorrente" color="purple" />
              </div>
            </ComponentCard>

            {/* Inputs */}
            <ComponentCard title="Campos de entrada">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <Input label="Nome do cliente" placeholder="Ex: Marina Costa" />
                <Input label="Telefone" placeholder="(11) 99999-0000" icon="phone" />
                <Input label="Endereço" placeholder="Rua, número, complemento" icon="mapPin" />
              </div>
            </ComponentCard>

            {/* Avatares */}
            <ComponentCard title="Avatares">
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, flexWrap: 'wrap' }}>
                <Avatar name="Marina Costa" size={48} color="green" />
                <Avatar name="João Mendes" size={40} color="sand" />
                <Avatar name="Beatriz Lima" size={36} color="amber" />
                <Avatar name="Carlos Rocha" size={28} color="green" />
              </div>
            </ComponentCard>

            {/* Cards */}
            <ComponentCard title="Card de Cliente">
              <ClientCard name="Marina Costa" houses={2} nextClean="Hoje 09:00" status="active" />
            </ComponentCard>

            <ComponentCard title="Card de Casa">
              <HouseCard address="Rua das Flores, 42" area={80} rooms={2} lastClean="25 abr" nextClean="Hoje 09:00" />
            </ComponentCard>

          </div>
        </section>

        {/* ── TELAS ── */}
        <section>
          <SectionHeader title="Telas" subtitle="Clique para navegar entre os fluxos do app" />
          {/* screen selector */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 32 }}>
            {Object.entries(screenLabels).map(([id, label]) => (
              <button key={id} onClick={() => setActiveScreen(id)} style={{
                padding: '7px 14px', borderRadius: 'var(--radius-full)', fontSize: 12, fontWeight: 500, cursor: 'pointer',
                fontFamily: 'var(--font-sans)', border: `1.5px solid ${activeScreen === id ? 'var(--green-500)' : 'var(--border-md)'}`,
                background: activeScreen === id ? 'var(--green-50)' : '#fff', color: activeScreen === id ? 'var(--green-700)' : 'var(--text-secondary)',
                transition: 'all 0.15s',
              }}>{label}</button>
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <PhoneFrame label={screenLabels[activeScreen]}>
              {screens[activeScreen]}
            </PhoneFrame>
          </div>
        </section>

        {/* ── SPACING / TOKENS ── */}
        <section>
          <SectionHeader title="Tokens de Espaçamento e Raio" subtitle="Escala consistente em todo o app" />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
            <ComponentCard title="Border Radius">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                {[
                  { name: '--radius-sm', val: '6px', px: 6 },
                  { name: '--radius-md', val: '10px', px: 10 },
                  { name: '--radius-lg', val: '16px', px: 16 },
                  { name: '--radius-xl', val: '22px', px: 22 },
                  { name: '--radius-full', val: '999px', px: 20 },
                ].map(r => (
                  <div key={r.name} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 40, height: 26, background: 'var(--green-200)', borderRadius: r.px }}></div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 500 }}>{r.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{r.val}</div>
                    </div>
                  </div>
                ))}
              </div>
            </ComponentCard>

            <ComponentCard title="Sombras">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {[
                  { name: '--shadow-sm', label: 'Leve (cards)' },
                  { name: '--shadow-md', label: 'Médio (modal, dropdown)' },
                  { name: '--shadow-lg', label: 'Forte (FAB, dialog)' },
                ].map(s => (
                  <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 40, height: 26, background: '#fff', borderRadius: 8, boxShadow: `var(${s.name})` }}></div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 500 }}>{s.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{s.label}</div>
                    </div>
                  </div>
                ))}
              </div>
            </ComponentCard>
          </div>
        </section>

      </div>

      {/* TWEAKS PANEL */}
      <TweaksPanel>
        <TweakSection label="Cor de destaque" />
        <TweakRadio
          label="Accent"
          value={tweaks.accentColor}
          options={['green', 'teal', 'sage']}
          onChange={(v) => setTweak('accentColor', v)}
        />
        <TweakSection label="Tipografia display" />
        <TweakRadio
          label="Estilo"
          value={tweaks.fontStyle}
          options={['serif', 'sans']}
          onChange={(v) => setTweak('fontStyle', v)}
        />
      </TweaksPanel>
    </div>
  );
};

/* ─── HELPERS ─── */
const SectionHeader = ({ title, subtitle }) => (
  <div style={{ marginBottom: 20 }}>
    <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 26, letterSpacing: '-0.03em', color: 'var(--text-primary)', marginBottom: 4 }}>{title}</h2>
    {subtitle && <p style={{ fontSize: 13, color: 'var(--text-muted)' }}>{subtitle}</p>}
  </div>
);

const TokenRow = ({ label, children }) => (
  <div>
    <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 10 }}>{label}</div>
    <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>{children}</div>
  </div>
);

const ComponentCard = ({ title, children }) => (
  <div style={{ background: '#fff', borderRadius: 'var(--radius-xl)', border: '1px solid var(--border)', padding: '20px' }}>
    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 14, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{title}</div>
    {children}
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root"></div>
</body>
</html>
